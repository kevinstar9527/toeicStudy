<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进度统计 - 托业背单词</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 2rem;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e9ecef;
        }

        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-label {
            font-weight: 500;
            color: #333;
            font-size: 0.9rem;
        }

        .control-select {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card.primary {
            border-top: 4px solid #667eea;
        }

        .stat-card.success {
            border-top: 4px solid #28a745;
        }

        .stat-card.warning {
            border-top: 4px solid #ffc107;
        }

        .stat-card.info {
            border-top: 4px solid #17a2b8;
        }

        .stat-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .stat-change {
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .stat-change.positive {
            color: #28a745;
        }

        .stat-change.negative {
            color: #dc3545;
        }

        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .chart-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .chart-canvas {
            width: 100%;
            height: 300px;
        }

        .tag-stats {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .tag-stats-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
        }

        .tag-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.3s ease;
        }

        .tag-item:hover {
            background: #f8f9fa;
        }

        .tag-item:last-child {
            border-bottom: none;
        }

        .tag-name {
            font-weight: 500;
            color: #333;
        }

        .tag-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }

        .progress-bar {
            flex: 1;
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .progress-text {
            font-size: 0.9rem;
            color: #666;
            min-width: 50px;
            text-align: right;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .daily-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .daily-stat {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .daily-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .daily-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .control-group {
                width: 100%;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .tag-progress {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 进度统计</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="exportData()">📤 导出数据</button>
                <button class="btn btn-primary" onclick="backToHome()">🏠 返回首页</button>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label class="control-label">时间范围</label>
                <select class="control-select" id="timeRange" onchange="updateStatistics()">
                    <option value="7">最近7天</option>
                    <option value="30" selected>最近30天</option>
                    <option value="90">最近90天</option>
                </select>
            </div>
            <div class="control-group">
                <label class="control-label">标签筛选</label>
                <select class="control-select" id="tagFilter" onchange="updateStatistics()">
                    <option value="">所有标签</option>
                </select>
            </div>
            <div class="control-group">
                <label class="control-label">统计类型</label>
                <select class="control-select" id="statType" onchange="updateStatistics()">
                    <option value="overview">概览统计</option>
                    <option value="trends">趋势分析</option>
                    <option value="tags">标签统计</option>
                </select>
            </div>
        </div>

        <div id="overviewSection">
            <div class="stats-grid">
                <div class="stat-card primary">
                    <div class="stat-icon">📚</div>
                    <div class="stat-number" id="totalCards">0</div>
                    <div class="stat-label">总卡片数</div>
                    <div class="stat-change" id="totalCardsChange">--</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-icon">✅</div>
                    <div class="stat-number" id="masteredCards">0</div>
                    <div class="stat-label">已掌握</div>
                    <div class="stat-change" id="masteredCardsChange">--</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-icon">📖</div>
                    <div class="stat-number" id="learningCards">0</div>
                    <div class="stat-label">学习中</div>
                    <div class="stat-change" id="learningCardsChange">--</div>
                </div>
                <div class="stat-card info">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-number" id="studyTime">0</div>
                    <div class="stat-label">学习时长(小时)</div>
                    <div class="stat-change" id="studyTimeChange">--</div>
                </div>
            </div>

            <div class="daily-stats">
                <div class="daily-stat">
                    <div class="daily-number" id="todayCards">0</div>
                    <div class="daily-label">今日学习</div>
                </div>
                <div class="daily-stat">
                    <div class="daily-number" id="weekCards">0</div>
                    <div class="daily-label">本周学习</div>
                </div>
                <div class="daily-stat">
                    <div class="daily-number" id="monthCards">0</div>
                    <div class="daily-label">本月学习</div>
                </div>
                <div class="daily-stat">
                    <div class="daily-number" id="streakDays">0</div>
                    <div class="daily-label">连续天数</div>
                </div>
            </div>
        </div>

        <div class="chart-container" id="trendsSection" style="display: none;">
            <div class="chart-title">学习趋势分析</div>
            <canvas class="chart-canvas" id="trendsChart"></canvas>
        </div>

        <div class="tag-stats" id="tagsSection" style="display: none;">
            <div class="tag-stats-title">标签学习进度</div>
            <div id="tagStatsList"></div>
        </div>
    </div>

    <script>
        // 数据管理器
        class StatisticsManager {
            constructor() {
                this.storageKey = 'toeic_memorization_data';
                this.statsKey = 'study_statistics';
            }

            getData() {
                return JSON.parse(localStorage.getItem(this.storageKey));
            }

            getStatistics() {
                const stats = localStorage.getItem(this.statsKey);
                return stats ? JSON.parse(stats) : this.initializeStatistics();
            }

            initializeStatistics() {
                const defaultStats = {
                    dailyProgress: {},
                    studySessions: [],
                    lastUpdate: new Date().toISOString()
                };
                localStorage.setItem(this.statsKey, JSON.stringify(defaultStats));
                return defaultStats;
            }

            updateDailyProgress(date, completedCards, studyTime) {
                const stats = this.getStatistics();
                if (!stats.dailyProgress[date]) {
                    stats.dailyProgress[date] = {
                        completedCards: 0,
                        studyTime: 0,
                        newCards: 0,
                        reviewCards: 0
                    };
                }
                
                stats.dailyProgress[date].completedCards += completedCards;
                stats.dailyProgress[date].studyTime += studyTime;
                stats.lastUpdate = new Date().toISOString();
                
                localStorage.setItem(this.statsKey, JSON.stringify(stats));
            }

            getAllTags() {
                const data = this.getData();
                const tags = new Set();
                data.cards.forEach(card => {
                    card.tags.forEach(tag => tags.add(tag));
                });
                return Array.from(tags).sort();
            }

            getTagStatistics() {
                const data = this.getData();
                const tagStats = {};

                data.cards.forEach(card => {
                    card.tags.forEach(tag => {
                        if (!tagStats[tag]) {
                            tagStats[tag] = {
                                total: 0,
                                mastered: 0,
                                learning: 0,
                                new: 0
                            };
                        }
                        
                        tagStats[tag].total++;
                        if (card.mastery >= 3) {
                            tagStats[tag].mastered++;
                        } else if (card.mastery > 0) {
                            tagStats[tag].learning++;
                        } else {
                            tagStats[tag].new++;
                        }
                    });
                });

                return tagStats;
            }

            getStudyStreak() {
                const stats = this.getStatistics();
                const dailyProgress = stats.dailyProgress;
                const dates = Object.keys(dailyProgress).sort().reverse();
                
                let streak = 0;
                const today = new Date().toDateString();
                
                for (let date of dates) {
                    if (dailyProgress[date].completedCards > 0) {
                        if (date === today || this.isConsecutiveDate(date, streak)) {
                            streak++;
                        } else {
                            break;
                        }
                    }
                }
                
                return streak;
            }

            isConsecutiveDate(dateString, daysBack) {
                const date = new Date(dateString);
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() - daysBack);
                return date.toDateString() === targetDate.toDateString();
            }

            getRecentProgress(days) {
                const stats = this.getStatistics();
                const result = [];
                const today = new Date();
                
                for (let i = days - 1; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(date.getDate() - i);
                    const dateString = date.toDateString();
                    
                    const dayData = stats.dailyProgress[dateString] || {
                        completedCards: 0,
                        studyTime: 0,
                        newCards: 0,
                        reviewCards: 0
                    };
                    
                    result.push({
                        date: dateString,
                        ...dayData
                    });
                }
                
                return result;
            }
        }

        // 图表管理器
        class ChartManager {
            constructor() {
                this.charts = {};
            }

            createLineChart(canvasId, data, labels) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                const width = canvas.width = canvas.offsetWidth;
                const height = canvas.height = 300;

                // 清除画布
                ctx.clearRect(0, 0, width, height);

                if (!data || data.length === 0) {
                    this.drawEmptyChart(ctx, width, height, '暂无数据');
                    return;
                }

                const padding = 40;
                const chartWidth = width - padding * 2;
                const chartHeight = height - padding * 2;

                // 计算数据范围
                const maxValue = Math.max(...data.map(d => d.completedCards || 0));
                const minValue = 0;
                const range = maxValue - minValue || 1;

                // 绘制坐标轴
                ctx.strokeStyle = '#e0e0e0';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(padding, padding);
                ctx.lineTo(padding, height - padding);
                ctx.lineTo(width - padding, height - padding);
                ctx.stroke();

                // 绘制网格线
                ctx.strokeStyle = '#f0f0f0';
                for (let i = 0; i <= 5; i++) {
                    const y = padding + (chartHeight / 5) * i;
                    ctx.beginPath();
                    ctx.moveTo(padding, y);
                    ctx.lineTo(width - padding, y);
                    ctx.stroke();
                }

                // 绘制数据线
                ctx.strokeStyle = '#667eea';
                ctx.lineWidth = 3;
                ctx.beginPath();

                data.forEach((point, index) => {
                    const x = padding + (chartWidth / (data.length - 1)) * index;
                    const y = height - padding - ((point.completedCards - minValue) / range) * chartHeight;
                    
                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();

                // 绘制数据点
                ctx.fillStyle = '#667eea';
                data.forEach((point, index) => {
                    const x = padding + (chartWidth / (data.length - 1)) * index;
                    const y = height - padding - ((point.completedCards - minValue) / range) * chartHeight;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fill();
                });

                // 绘制标签
                ctx.fillStyle = '#666';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                
                const step = Math.max(1, Math.floor(data.length / 7));
                data.forEach((point, index) => {
                    if (index % step === 0) {
                        const x = padding + (chartWidth / (data.length - 1)) * index;
                        const date = new Date(point.date);
                        const label = `${date.getMonth() + 1}/${date.getDate()}`;
                        ctx.fillText(label, x, height - padding + 20);
                    }
                });

                // Y轴标签
                ctx.textAlign = 'right';
                for (let i = 0; i <= 5; i++) {
                    const value = Math.round((maxValue / 5) * (5 - i));
                    const y = padding + (chartHeight / 5) * i;
                    ctx.fillText(value.toString(), padding - 10, y + 4);
                }
            }

            drawEmptyChart(ctx, width, height, message) {
                ctx.fillStyle = '#999';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(message, width / 2, height / 2);
            }
        }

        // 全局变量
        const statsManager = new StatisticsManager();
        const chartManager = new ChartManager();
        let currentView = 'overview';

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateTagFilter();
            updateStatistics();
        });

        // 更新标签筛选器
        function updateTagFilter() {
            const tags = statsManager.getAllTags();
            const tagFilter = document.getElementById('tagFilter');
            
            tagFilter.innerHTML = '<option value="">所有标签</option>';
            tags.forEach(tag => {
                tagFilter.innerHTML += `<option value="${escapeHtml(tag)}">${escapeHtml(tag)}</option>`;
            });
        }

        // 更新统计信息
        function updateStatistics() {
            const timeRange = parseInt(document.getElementById('timeRange').value);
            const tagFilter = document.getElementById('tagFilter').value;
            const statType = document.getElementById('statType').value;

            // 显示/隐藏相应部分
            document.getElementById('overviewSection').style.display = statType === 'overview' ? 'block' : 'none';
            document.getElementById('trendsSection').style.display = statType === 'trends' ? 'block' : 'none';
            document.getElementById('tagsSection').style.display = statType === 'tags' ? 'block' : 'none';

            currentView = statType;

            switch (statType) {
                case 'overview':
                    updateOverviewStats(timeRange, tagFilter);
                    break;
                case 'trends':
                    updateTrendsChart(timeRange, tagFilter);
                    break;
                case 'tags':
                    updateTagStatistics(tagFilter);
                    break;
            }
        }

        // 更新概览统计
        function updateOverviewStats(timeRange, tagFilter) {
            const data = statsManager.getData();
            const stats = statsManager.getStatistics();
            
            // 基础统计
            let totalCards = data.cards.length;
            let masteredCards = data.cards.filter(card => card.mastery >= 3).length;
            let learningCards = data.cards.filter(card => card.mastery > 0 && card.mastery < 3).length;
            
            // 应用标签筛选
            if (tagFilter) {
                const filteredCards = data.cards.filter(card => card.tags.includes(tagFilter));
                totalCards = filteredCards.length;
                masteredCards = filteredCards.filter(card => card.mastery >= 3).length;
                learningCards = filteredCards.filter(card => card.mastery > 0 && card.mastery < 3).length;
            }

            // 计算学习时长（最近30天的总时长）
            const recentProgress = statsManager.getRecentProgress(30);
            const totalStudyTime = recentProgress.reduce((sum, day) => sum + (day.studyTime || 0), 0);
            const studyTimeHours = Math.round(totalStudyTime / 60 * 10) / 10; // 转换为小时，保留1位小数

            // 更新显示
            document.getElementById('totalCards').textContent = totalCards;
            document.getElementById('masteredCards').textContent = masteredCards;
            document.getElementById('learningCards').textContent = learningCards;
            document.getElementById('studyTime').textContent = studyTimeHours;

            // 计算变化率（与上一个周期比较）
            const previousProgress = statsManager.getRecentProgress(timeRange * 2).slice(0, timeRange);
            const currentProgress = statsManager.getRecentProgress(timeRange);
            
            const previousTotal = previousProgress.reduce((sum, day) => sum + (day.completedCards || 0), 0);
            const currentTotal = currentProgress.reduce((sum, day) => sum + (day.completedCards || 0), 0);
            
            const changePercent = previousTotal > 0 ? Math.round(((currentTotal - previousTotal) / previousTotal) * 100) : 0;
            const changeText = changePercent >= 0 ? `+${changePercent}%` : `${changePercent}%`;
            const changeClass = changePercent >= 0 ? 'positive' : 'negative';

            document.getElementById('totalCardsChange').textContent = changeText;
            document.getElementById('totalCardsChange').className = `stat-change ${changeClass}`;

            // 今日、本周、本月统计
            const today = new Date().toDateString();
            const todayData = stats.dailyProgress[today] || { completedCards: 0 };
            document.getElementById('todayCards').textContent = todayData.completedCards;

            // 本周统计
            const weekProgress = statsManager.getRecentProgress(7);
            const weekTotal = weekProgress.reduce((sum, day) => sum + (day.completedCards || 0), 0);
            document.getElementById('weekCards').textContent = weekTotal;

            // 本月统计
            const monthProgress = statsManager.getRecentProgress(30);
            const monthTotal = monthProgress.reduce((sum, day) => sum + (day.completedCards || 0), 0);
            document.getElementById('monthCards').textContent = monthTotal;

            // 连续天数
            const streak = statsManager.getStudyStreak();
            document.getElementById('streakDays').textContent = streak;
        }

        // 更新趋势图表
        function updateTrendsChart(timeRange, tagFilter) {
            const recentProgress = statsManager.getRecentProgress(timeRange);
            
            if (recentProgress.length > 0) {
                chartManager.createLineChart('trendsChart', recentProgress, []);
            }
        }

        // 更新标签统计
        function updateTagStatistics(tagFilter) {
            const tagStats = statsManager.getTagStatistics();
            const container = document.getElementById('tagStatsList');
            
            let filteredStats = tagStats;
            if (tagFilter) {
                filteredStats = { [tagFilter]: tagStats[tagFilter] };
            }

            if (Object.keys(filteredStats).length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🏷️</div>
                        <h3>暂无标签数据</h3>
                        <p>请先为卡片添加标签以查看统计信息</p>
                    </div>
                `;
                return;
            }

            const tagStatsHtml = Object.entries(filteredStats).map(([tag, stats]) => {
                const masteryRate = stats.total > 0 ? Math.round((stats.mastered / stats.total) * 100) : 0;
                return `
                    <div class="tag-item">
                        <div class="tag-name">${escapeHtml(tag)}</div>
                        <div class="tag-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${masteryRate}%"></div>
                            </div>
                            <div class="progress-text">${masteryRate}%</div>
                        </div>
                        <div style="min-width: 100px; text-align: right; color: #666;">
                            ${stats.mastered}/${stats.total}
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = tagStatsHtml;
        }

        // 导出数据
        function exportData() {
            const data = statsManager.getData();
            const stats = statsManager.getStatistics();
            
            const exportData = {
                exportDate: new Date().toISOString(),
                cards: data.cards,
                statistics: stats,
                summary: {
                    totalCards: data.cards.length,
                    masteredCards: data.cards.filter(card => card.mastery >= 3).length,
                    learningCards: data.cards.filter(card => card.mastery > 0 && card.mastery < 3).length,
                    studyStreak: statsManager.getStudyStreak()
                }
            };

            const jsonString = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `托业背单词统计_${new Date().toLocaleDateString('zh-CN')}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 返回首页
        function backToHome() {
            window.location.href = 'index.html';
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 定期更新统计（每30秒）
        setInterval(updateStatistics, 30000);
    </script>
</body>
</html>
