<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托业背单词 - 高效记忆工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header .date {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .task-card {
            border-left: 5px solid #4CAF50;
        }

        .progress-card {
            border-left: 5px solid #2196F3;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .task-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #4CAF50;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .progress-bar {
            background: #f0f0f0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

        .navigation {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .nav-item {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .nav-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .nav-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .nav-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .nav-desc {
            color: #666;
            font-size: 0.9rem;
        }

        .study-nav {
            border-top: 4px solid #FF9800;
        }

        .manage-nav {
            border-top: 4px solid #9C27B0;
        }

        .stats-nav {
            border-top: 4px solid #00BCD4;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .navigation {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
    </style>
    <script src="toeic-words.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <button class="btn-back" onclick="goBack()">返回</button>
                <h1>托业背单词</h1>
                <div class="date" id="currentDate"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="card task-card">
                <h2>📚 今日任务</h2>
                <div class="task-stats">
                    <div class="stat-item">
                        <div class="stat-number" id="reviewCount">0</div>
                        <div class="stat-label">待复习</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="newCount">0</div>
                        <div class="stat-label">新单词</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="completedCount">0</div>
                        <div class="stat-label">已完成</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">今日完成度: 0%</div>
            </div>

            <div class="card progress-card">
                <h2>📊 学习进度</h2>
                <div class="task-stats">
                    <div class="stat-item">
                        <div class="stat-number" id="totalCards">0</div>
                        <div class="stat-label">总单词</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="masteredCards">0</div>
                        <div class="stat-label">已掌握</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="masteryRate">0%</div>
                        <div class="stat-label">掌握率</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="masteryProgress" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="masteryText">整体掌握率: 0%</div>
            </div>
        </div>

        <div class="navigation">
            <div class="nav-item study-nav" onclick="startStudying()">
                <div class="nav-icon">📖</div>
                <div class="nav-title">开始背诵</div>
                <div class="nav-desc">智能间隔重复，高效记忆</div>
            </div>

            <div class="nav-item manage-nav" onclick="manageCards()">
                <div class="nav-icon">📝</div>
                <div class="nav-title">卡片管理</div>
                <div class="nav-desc">创建编辑，分类管理</div>
            </div>

            <div class="nav-item stats-nav" onclick="viewStatistics()">
                <div class="nav-icon">📈</div>
                <div class="nav-title">进度统计</div>
                <div class="nav-desc">数据分析，趋势跟踪</div>
            </div>
        </div>
    </div>

    <script>
        // 数据管理类
        class DataManager {
            constructor() {
                this.storageKey = 'toeic_memorization_data';
                this.initData();
            }

            initData() {
                if (!localStorage.getItem(this.storageKey)) {
                    this.createDefaultData();
                }
            }

            createDefaultData() {
                const defaultData = {
                    cards: this.getDefaultTOEICCards(),
                    studyRecords: {},
                    settings: {
                        dailyNewCards: 20,
                        studyMode: 'random'
                    },
                    statistics: {
                        totalStudyTime: 0,
                        streakDays: 0,
                        lastStudyDate: null
                    }
                };
                localStorage.setItem(this.storageKey, JSON.stringify(defaultData));
            }

            getDefaultTOEICCards() {
                // 使用 toeic-words.js 中的 540 个托业词汇
                if (typeof TOEIC_BASIC_WORDS !== 'undefined') {
                    return TOEIC_BASIC_WORDS;
                }
                // 如果 toeic-words.js 未加载，使用备用数据
                return [
                    { id: 1, front: 'notice', back: '/ˈnəʊtɪs/ n. 公告，注意，通知', tags: ['托业基础', '托业基础课程01', '高频词汇'], mastery: 0, nextReview: null, reviewCount: 0, stage: 'learning', interval: 0, lastReview: null, easeFactor: 2.5, difficultyFactor: 1.8, successiveGoodCount: 0 },
                    { id: 2, front: 'attend', back: '/əˈtend/ v. 参加，出席', tags: ['托业基础', '托业基础课程01', '高频词汇'], mastery: 0, nextReview: null, reviewCount: 0, stage: 'learning', interval: 0, lastReview: null, easeFactor: 2.5, difficultyFactor: 1.8, successiveGoodCount: 0 },
                    { id: 3, front: 'available', back: '/əˈveɪləbl/ adj. 可利用的；有空的', tags: ['托业基础', '托业基础课程01', '高频词汇'], mastery: 0, nextReview: null, reviewCount: 0, stage: 'learning', interval: 0, lastReview: null, easeFactor: 2.5, difficultyFactor: 1.8, successiveGoodCount: 0 },
                    { id: 4, front: 'authority', back: '/ɔːˈθɒrəti/ n. 权力，职权', tags: ['托业基础', '托业基础课程01', '高频词汇'], mastery: 0, nextReview: null, reviewCount: 0, stage: 'learning', interval: 0, lastReview: null, easeFactor: 2.5, difficultyFactor: 1.8, successiveGoodCount: 0 },
                    { id: 5, front: 'abandon', back: '放弃，抛弃', tags: ['托业基础'], mastery: 0, nextReview: null, reviewCount: 0, stage: 'learning', interval: 0, lastReview: null, easeFactor: 2.5, difficultyFactor: 1.8, successiveGoodCount: 0 }
                ];
            }

            getData() {
                return JSON.parse(localStorage.getItem(this.storageKey));
            }

            saveData(data) {
                localStorage.setItem(this.storageKey, JSON.stringify(data));
            }

            getTodayTasks() {
                const data = this.getData();
                const today = new Date().toDateString();
                const todayTasks = [];
                const newCards = [];

                data.cards.forEach(card => {
                    if (card.nextReview === today) {
                        todayTasks.push(card);
                    } else if (card.mastery === 0 && card.nextReview === null) {
                        newCards.push(card);
                    }
                });

                return {
                    reviewCards: todayTasks,
                    newCards: newCards.slice(0, data.settings.dailyNewCards),
                    totalNewCards: newCards.length
                };
            }

            updateCard(cardId, updates) {
                const data = this.getData();
                const cardIndex = data.cards.findIndex(card => card.id === cardId);
                if (cardIndex !== -1) {
                    data.cards[cardIndex] = { ...data.cards[cardIndex], ...updates };
                    this.saveData(data);
                }
            }

            getStatistics() {
                const data = this.getData();
                const total = data.cards.length;
                const mastered = data.cards.filter(card => card.mastery >= 3).length;
                const studying = data.cards.filter(card => card.mastery > 0 && card.mastery < 3).length;
                const notStarted = data.cards.filter(card => card.mastery === 0).length;

                return {
                    total,
                    mastered,
                    studying,
                    notStarted,
                    masteryRate: total > 0 ? Math.round((mastered / total) * 100) : 0
                };
            }
        }

        // 全局数据管理器
        const dataManager = new DataManager();

        // 更新页面数据
        function updatePageData() {
            const tasks = dataManager.getTodayTasks();
            const stats = dataManager.getStatistics();
            
            // 更新今日任务
            document.getElementById('reviewCount').textContent = tasks.reviewCards.length;
            document.getElementById('newCount').textContent = tasks.newCards.length;
            
            const completedToday = parseInt(localStorage.getItem('completedToday') || '0');
            document.getElementById('completedCount').textContent = completedToday;
            
            const totalToday = tasks.reviewCards.length + tasks.newCards.length;
            const completionRate = totalToday > 0 ? Math.round((completedToday / totalToday) * 100) : 0;
            
            document.getElementById('progressFill').style.width = completionRate + '%';
            document.getElementById('progressText').textContent = `今日完成度: ${completionRate}%`;
            
            // 更新学习进度
            document.getElementById('totalCards').textContent = stats.total;
            document.getElementById('masteredCards').textContent = stats.mastered;
            document.getElementById('masteryRate').textContent = stats.masteryRate + '%';
            document.getElementById('masteryProgress').style.width = stats.masteryRate + '%';
            document.getElementById('masteryText').textContent = `整体掌握率: ${stats.masteryRate}%`;
        }

        // 设置当前日期
        function setCurrentDate() {
            const date = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('currentDate').textContent = date.toLocaleDateString('zh-CN', options);
        }

        // 页面导航函数
        function startStudying() {
            window.location.href = 'study.html';
        }

        function manageCards() {
            window.location.href = 'cards.html';
        }

        function viewStatistics() {
            window.location.href = 'statistics.html';
        }

        function goBack() {
            // Navigate directly to index.html
            window.location.href = 'index.html';
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            setCurrentDate();
            updatePageData();
            
            // 重置今日完成数（如果是新的一天）
            const today = new Date().toDateString();
            const lastVisit = localStorage.getItem('lastVisit');
            if (lastVisit !== today) {
                localStorage.setItem('completedToday', '0');
                localStorage.setItem('lastVisit', today);
            }
        });

        // 每分钟更新一次时间
        setInterval(setCurrentDate, 60000);
    </script>
</body>
</html>
